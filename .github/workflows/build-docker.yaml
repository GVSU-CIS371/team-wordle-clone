name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag team-wordle-clone:latest
    - name: Push to Docker hub
      run: |
        docker login -u maxkollmeyer -p ${{ secrets.DOCKERHUBTOKEN }}
        docker push team-wordle-clone:latest
